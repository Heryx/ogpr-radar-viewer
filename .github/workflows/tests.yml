name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
    
    - name: Test imports
      run: |
        python -c "from ogpr_viewer import OGPRParser, SignalProcessor"
        python -c "from ogpr_viewer.visualization import RadarCanvas"
    
    - name: Run tests (when available)
      run: |
        # pytest tests/ --cov=ogpr_viewer --cov-report=xml
        echo "Tests will be added in future versions"
      continue-on-error: true
    
    - name: Upload coverage (when available)
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
      run: |
        # Upload to codecov or similar
        echo "Coverage reporting will be added"
      continue-on-error: true